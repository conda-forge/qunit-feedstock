context:
  version: "2.24.3"

package:
  name: qunit
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/qunit/-/qunit-${{ version }}.tgz
  sha256: 2ea9f912967faedfbbd6ee88a5517294ff442c2d0d1b35b4f3176ef8b22a542c

build:
  number: 0
  noarch: generic

requirements:
  build:
    - jq
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - qunit --help

about:
  license: MIT
  license_file:
    - LICENSE.txt
    - third-party-licenses.txt
  summary: The powerful, easy-to-use testing framework.
  homepage: https://github.com/qunitjs/qunit
  repository: https://github.com/qunitjs/qunit

extra:
  recipe-maintainers:
    - danielnachun
